kind: Deployment
apiVersion: apps/v1

metadata:
  name: productservice-deployment
  namespace: ms-ecom-application
  labels:
    app: product-service
    tier: backend
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
      tier: backend

  template:
    metadata:
      name: productservice-pod
      labels:
        app: product-service
        tier: backend

    spec:
      initContainers:
        - name: seed-service
          image: hackerspider09/ecom-productservice:latest
          command: ["npm", "run", "seed"]
          env:
            - name: MONGODB_URI
              value: "mongodb://admin:admin@productdb-st-0.productdb-service:27017/productdb?authSource=admin"
        
      containers:
        - name: product-service
          image: hackerspider09/ecom-productservice:latest
          ports:
            - containerPort: 3001
          env:
            - name: MONGODB_URI
              value: "mongodb://admin:admin@productdb-st-0.productdb-service:27017/productdb?authSource=admin"
