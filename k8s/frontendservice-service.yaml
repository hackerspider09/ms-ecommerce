kind: Service
apiVersion: v1

metadata:
  name: frontend-service
  namespace: ms-ecom-application
  labels:
    app: frontend
    tier: frontend
spec:
  selector:
    app: frontend
    tier: frontend
  
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
      name: prod

    - port: 5173
      targetPort: 5173
      nodePort: 30008
      name: dev
