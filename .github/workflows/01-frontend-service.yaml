name: 01 Frontend workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cicd
    paths:
      - 'frontend/**'
          

env:
  dir_name: 'frontend'
  branch_name: 'main'
  language: 'javascript'

jobs:
  debug:
    uses: ./.github/workflows/debug.yaml
    with:
      message: "Frontend workflow running"


  secret-scan:
    uses: ./.github/workflows/secrets-scan.yaml
    with:
      branch_name: 'main'

  code-quality:
    uses: ./.github/workflows/code-scan.yaml
    with:
      branch_name: ${{ env.branch_name }}
      service_lang: ${{ env.language }}

