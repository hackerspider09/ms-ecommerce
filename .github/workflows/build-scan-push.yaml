name: Build, scan and push artifact

on:
  workflow_call:
    inputs:
      branch_name:
        description: Use to checkout to specific branch
        type: string
        default: main
      service_lang:
        description: Language of application/service to setup for scans
        type: string
        required: true
      dir_name:
        description: Dir of code
        type: string
        required: true
      dockerfile_name:
        description: Docker file name
        type: string
        default: Dockerfile
      image_name:
        description: Image name for application to push
        type: string
        required: true

jobs:
  image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.dir_name }} 
          file: ${{ inputs.dir_name }}/${{ inputs.dockerfile_name }}
          push: false
          tags: |
            "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
            "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest"

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          exit-code: '1'
          severity: 'CRITICAL'  
          scan-type: 'image'  
          image-ref: "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push docker image to Docker Hub
        run: |
          docker push "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}" || true
          docker push "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest" || true